<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vechelon — Club Command</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@200;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050A12;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow Condensed', sans-serif;
      overflow: hidden;
    }

    #ambient-glow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 1400px;
      height: 1400px;
      pointer-events: none;
      z-index: 0;
    }

    body > *:not(#ambient-glow) {
      position: relative;
      z-index: 1;
    }

    .wordmark {
      font-size: clamp(52px, 10vw, 80px);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      line-height: 1;
      text-align: center;
    }

    .bold-letter {
      font-weight: 800;
      color: #ffffff;
    }

    .accent-letter {
      font-weight: 800;
      color: #3B82F6;
    }

    .tagline {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.46em;
      text-transform: uppercase;
      color: #5A8AA8;
      margin-top: 10px;
      text-align: center;
    }

    /* height reserves layout space; clipping is handled by SVG clipPath inside */
    .ring-window {
      width: 200px;
      height: 94px;
      margin-bottom: 5px;
    }

    .ring-svg {
      display: block;
      overflow: visible; /* allows glow to bleed beyond the layout box */
      filter: drop-shadow(0 0 18px rgba(59,130,246,0.35)) drop-shadow(0 0 6px rgba(59,130,246,0.2));
    }


    /* colour picker */
    .swatch-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-top: 28px;
    }

    .swatch-cap {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: #1A3050;
    }

    .sw-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .sw {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      border: 2.5px solid transparent;
      cursor: pointer;
      outline: none;
      transition: all 0.15s;
    }

    .sw.on {
      border-color: #fff;
      transform: scale(1.22);
    }

    input[type=color] {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      border: 2px solid #1A2740;
      cursor: pointer;
      background: #0D1526;
      padding: 2px;
    }

    .coming {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: #4A7A9A;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <div id="ambient-glow"></div>

  <div class="ring-window">
    <svg class="ring-svg" id="chainring" viewBox="-145 -145 290 290" width="200" height="200"></svg>
  </div>

  <div class="wordmark">
    <span class="bold-letter">VE</span><span class="accent-letter">che</span><span class="bold-letter">LO</span><span class="accent-letter">n</span>
  </div>

  <div class="tagline">Club Command</div>

  <div class="swatch-wrap">
    <div class="sw-row" id="swatches"></div>
  </div>

  <div class="coming">Coming Soon</div>

  <script>
    const toR = d => d * Math.PI / 180;
    const pt  = (cx, cy, r, deg) => [cx + r * Math.cos(toR(deg)), cy + r * Math.sin(toR(deg))];
    const f   = n => parseFloat(n.toFixed(3));

    function hole(cx, cy, r) {
      return `M${f(cx+r)},${f(cy)} A${r},${r},0,1,0,${f(cx-r)},${f(cy)} A${r},${r},0,1,0,${f(cx+r)},${f(cy)}Z`;
    }

    function buildChainring(cx, cy) {
      const N=40, rT=138, rV=114, rI=51, bR=85, bRad=13;
      const thW=3.8, thN=2.2;
      const [sx,sy] = pt(cx,cy,rV,-90-thW);
      let d = `M${f(sx)},${f(sy)}`;
      for(let i=0;i<N;i++){
        const A = -90 + i*(360/N);
        const th = (i%2===0) ? thW : thN;
        const vE=A-th, tE=A+th;
        const[a,b]=pt(cx,cy,rV,vE); d+=` A${rV},${rV},0,0,1,${f(a)},${f(b)}`;
        const[c,e]=pt(cx,cy,rT,vE); d+=` L${f(c)},${f(e)}`;
        const[g,h]=pt(cx,cy,rT,tE); d+=` A${rT},${rT},0,0,1,${f(g)},${f(h)}`;
        const[j,k]=pt(cx,cy,rV,tE); d+=` L${f(j)},${f(k)}`;
      }
      d += "Z";
      d += " " + hole(cx, cy, rI);
      for(let b=0;b<5;b++){
        const[bx,by]=pt(cx,cy,bR,-90+b*72);
        d += " " + hole(bx,by,bRad);
      }
      return d;
    }

    const svg = document.getElementById('chainring');
    svg.innerHTML = `
      <defs>
        <clipPath id="topclip">
          <rect x="-145" y="-145" width="290" height="136"/>
        </clipPath>
      </defs>
      <g class="ring-group">
        <g clip-path="url(#topclip)">
          <path fill="#3B82F6" fill-rule="evenodd" d="${buildChainring(0, 0)}"/>
        </g>
      </g>
    `;

    // colour system
    let col = '#3B82F6';

    const presets = [
      {hex:'#3B82F6', name:'Cobalt'},
      {hex:'#EF4444', name:'Crimson'},
      {hex:'#10B981', name:'Emerald'},
      {hex:'#F59E0B', name:'Amber'},
      {hex:'#8B5CF6', name:'Violet'},
      {hex:'#F97316', name:'Fluo'},
    ];

    const sr = document.getElementById('swatches');
    presets.forEach(({hex, name}) => {
      const b = document.createElement('button');
      b.className = 'sw';
      b.style.background = hex;
      b.dataset.h = hex;
      b.title = name;
      b.onclick = () => paint(hex);
      sr.appendChild(b);
    });

    const pk = document.createElement('input');
    pk.type = 'color';
    pk.value = col;
    pk.oninput = e => paint(e.target.value);
    sr.appendChild(pk);

    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return `${r},${g},${b}`;
    }

    function paint(c) {
      col = c;
      pk.value = c;
      const rgb = hexToRgb(c);
      document.querySelector('.ring-group path').setAttribute('fill', c);
      document.querySelector('.ring-svg').style.filter =
        `drop-shadow(0 0 18px ${c}55) drop-shadow(0 0 6px ${c}33)`;
      document.querySelectorAll('.accent-letter').forEach(el => el.style.color = c);
      document.querySelectorAll('.sw').forEach(el => el.classList.toggle('on', el.dataset.h === c));
      document.getElementById('ambient-glow').style.background =
        `radial-gradient(circle, rgba(${rgb},0.08) 0%, rgba(${rgb},0.04) 25%, rgba(${rgb},0.01) 50%, transparent 75%)`;
    }

    paint(col);

    // rotate around SVG origin (0,0) = ring geometric centre
    const ringGroup = svg.querySelector('.ring-group');
    const duration = 18000;
    const t0 = performance.now();
    (function tick(now) {
      const angle = ((now - t0) / duration * 360) % 360;
      ringGroup.setAttribute('transform', `rotate(${angle})`);
      requestAnimationFrame(tick);
    })(t0);
  </script>

</body>
</html>
